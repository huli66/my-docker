version: "3.8"
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --requirepass hjj123
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "hjj123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_net

  # ----------------------------------------------------------
  #  MySQL 8
  #  Port  : 3306
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: hjj123
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: hjj123
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p'hjj123'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  # ----------------------------------------------------------
  #  RabbitMQ 3 (带 Management UI)
  #  AMQP : 5672
  #  Web UI: http://localhost:15672  (guest / CHANGE_ME)
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management Web UI
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: hjj123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app_net