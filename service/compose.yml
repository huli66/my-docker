version: "3.8"
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "5000:6379"
    volumes:
      - ../../data/redis:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_net

  # ----------------------------------------------------------
  #  MySQL 8
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "5001:3306"
    volumes:
      - ../../data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "5002:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - app_net

  # ----------------------------------------------------------
  #  RabbitMQ 3 (带 Management UI)
  #  AMQP : 5672
  #  Web UI: http://localhost:15672  (guest / CHANGE_ME)
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "5003:5672"    # AMQP
      - "5004:15672"  # Management Web UI
    volumes:
      - ../../data/rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app_net

networks:
  app_net:
    external: true
