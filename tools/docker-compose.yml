version: "3.8"
services:
  speedtest:
    restart: unless-stopped
    container_name: openspeedtest
    ports:
      - 4000:3000
      - 4001:3001
    image: openspeedtest/latest
    networks:
      - app_net

  lazydocker:
    image: lazyteam/lazydocker
    container_name: lazydocker
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app_net