version: "3.8"
services:
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/dockge:/app/data
      - /opt/stacks:/opt/stacks   # ← 左右路径必须完全一致
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    networks:
      - app_net