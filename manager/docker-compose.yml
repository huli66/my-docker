version: "3.8"
services:
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/dockge:/app/data
      - /opt/stacks:/opt/stacks   # ← 左右路径必须完全一致
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    networks:
      - app_net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"   # HTTPS（推荐）
      - "9000:9000"   # HTTP
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - app_net

networks:
  app_net:
    driver: bridge